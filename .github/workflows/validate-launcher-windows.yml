name: Validate launcher behavior on Windows

# Runs the actual kivun-terminal.bat against a real Windows + WSL Ubuntu
# environment, then asserts the v1.1.1 bugfix invariants on LAUNCH_LOG.txt.
#
# Why this exists: PR #8 fixed the "Claude not found -> launcher claims
# fallback then crashes" bug, but build-windows.yml only builds the .exe
# without ever running the .bat. Without this workflow, the v1.1.1
# guarantees were spec-translated and pattern-matched but never executed
# end-to-end. The user-reported bug burned someone once already; this
# workflow makes sure it can't silently regress.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'payload/kivun-terminal.bat'
      - 'payload/kivun-launch.sh'
      - 'payload/kivun-direct.sh'
      - '.github/workflows/validate-launcher-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'payload/kivun-terminal.bat'
      - 'payload/kivun-launch.sh'
      - 'payload/kivun-direct.sh'
      - '.github/workflows/validate-launcher-windows.yml'

jobs:

  # -------------------------------------------------------------------------
  # Job 1 — Static checks on the .bat (~30 sec, no WSL needed).
  # Catches the obvious class of regressions: a goto/call to a label that
  # doesn't exist (the kind of bug that ships only because the failing path
  # is rarely exercised, which is exactly the v1.1.1 bug shape).
  # -------------------------------------------------------------------------
  static-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify every label referenced via goto/call exists
        run: |
          set -eu
          BAT=payload/kivun-terminal.bat
          # Extract all label definitions (lines starting with ":NAME").
          # grep -o keeps only the label token, dropping CRLF and any inline
          # comment that might sit on the rest of the line.
          mapfile -t labels < <(grep -oE '^:[a-zA-Z_][a-zA-Z0-9_]*' "$BAT" | sed 's/^://' | sort -u)
          echo "Labels defined:"
          printf '  %s\n' "${labels[@]}"
          # Extract all goto/call target labels.
          mapfile -t refs < <(grep -oiE '(goto|call) :[a-zA-Z_][a-zA-Z0-9_]*' "$BAT" | awk '{print $2}' | sed 's/^://' | sort -u)
          echo "Labels referenced:"
          printf '  %s\n' "${refs[@]}"
          fail=0
          for ref in "${refs[@]}"; do
            found=0
            for lbl in "${labels[@]}"; do
              if [ "$ref" = "$lbl" ]; then found=1; break; fi
            done
            if [ "$found" -eq 0 ]; then
              echo "FAIL: label :$ref referenced but not defined in $BAT"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "PASS: all label refs resolve"
          exit $fail

      - name: Verify v1.1.1 invariants (CLAUDE_IN_WSL flag + new helpers)
        run: |
          set -eu
          BAT=payload/kivun-terminal.bat
          # The v1.1.1 fix relies on three things being present and connected.
          # If any of these go missing, the Claude-not-found-then-crash bug
          # comes back.
          grep -q '^:INSTALL_CLAUDE_WSL' "$BAT" \
            || (echo "FAIL: :INSTALL_CLAUDE_WSL helper missing"; exit 1)
          grep -q '^:no_claude_exit' "$BAT" \
            || (echo "FAIL: :no_claude_exit helper missing"; exit 1)
          grep -q 'CLAUDE_IN_WSL' "$BAT" \
            || (echo "FAIL: CLAUDE_IN_WSL flag not used (v1.1.1 guard removed?)"; exit 1)
          # The :run_direct block must check CLAUDE_IN_WSL before invoking claude.
          # Look for the guard pattern within ~10 lines after :run_direct.
          awk '/^:run_direct/{in_block=1; lines=0} in_block{print; lines++; if(lines>15) exit}' "$BAT" \
            | grep -q 'CLAUDE_IN_WSL' \
            || (echo "FAIL: :run_direct does not check CLAUDE_IN_WSL — the bug is back"; exit 1)
          # The deprecated install message must be gone.
          ! grep -q 'sudo npm install -g @anthropic-ai/claude-code' "$BAT" \
            || (echo "FAIL: deprecated 'sudo npm install -g' message still in .bat"; exit 1)
          echo "PASS: all v1.1.1 invariants intact"

  # -------------------------------------------------------------------------
  # Job 2 — Run the .bat against real WSL+Ubuntu and validate LAUNCH_LOG.
  # Scenario: WSL+Ubuntu present, Konsole NOT installed (we deliberately
  # don't pre-install it), Claude NOT installed. Drives the launcher down
  # the Konsole-fail -> :run_direct -> :no_claude_exit path. With the
  # v1.1.1 guard, this MUST exit cleanly without invoking claude.
  # -------------------------------------------------------------------------
  test-no-claude-no-konsole:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available on the runner
        shell: pwsh
        run: |
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: pwsh
        run: |
          # windows-latest images pre-install WSL2 features. --no-launch
          # avoids the interactive user-creation prompt; we use --user root
          # for everything in CI so a regular user isn't required.
          wsl --install -d Ubuntu --no-launch
          # Wait up to 2 min for the distro to be queryable.
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host "wsl -l -v output:"
          Write-Host $list
          # Confirm bash works (forces distro init).
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Confirm Claude is NOT in WSL (CI baseline)
        shell: pwsh
        run: |
          $r = wsl -d Ubuntu --user root -- bash -c "command -v claude || echo NOT_FOUND"
          Write-Host "claude lookup: $r"
          if ($r -notmatch 'NOT_FOUND') {
            throw "Claude unexpectedly already installed in fresh Ubuntu"
          }

      - name: Run launcher and capture exit code
        shell: cmd
        # v1.1.3: install no longer prompts by default (AUTO_INSTALL_CLAUDE
        # defaults to "yes"). To exercise the no-Claude-exit path the
        # launcher needs config.txt with AUTO_INSTALL_CLAUDE=no, otherwise
        # it would auto-install instead of exiting.
        # The blank-line stdin remains as belt-and-suspenders for any
        # future pause prompts.
        continue-on-error: true
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          (echo.) >> "%RUNNER_TEMP%\launcher_input.txt"
          call payload\kivun-terminal.bat C:\temp < "%RUNNER_TEMP%\launcher_input.txt"
          set "RC=%ERRORLEVEL%"
          echo Captured launcher exit code: %RC%
          REM Parens are mandatory: without them, "echo LAUNCHER_EXITCODE=2>>file"
          REM is parsed by cmd as "echo LAUNCHER_EXITCODE=" + "2>>file" (stderr
          REM redirect), which silently drops the "2" from the env value.
          (echo LAUNCHER_EXITCODE=%RC%)>>"%GITHUB_ENV%"

      - name: Assert v1.1.1 invariants on LAUNCH_LOG.txt
        shell: pwsh
        run: |
          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          if (-not (Test-Path $log)) {
            throw "FAIL: LAUNCH_LOG.txt was not created at $log"
          }
          $content = Get-Content $log -Raw
          Write-Host "----- LAUNCH_LOG.txt -----"
          Write-Host $content
          Write-Host "--------------------------"

          # Invariant 1: launcher must NOT contain the bug signature.
          # The v1.0.6 -> v1.1.0 bug was: ERROR - Claude Code not found
          # immediately followed by INFO - Executing: claude. That sequence
          # in the log means the launcher claimed to fall back and then
          # tried to run the missing binary. v1.1.1 must never do this.
          if ($content -match '(?s)ERROR\s*-\s*Claude Code not found.*?INFO\s*-\s*Executing:\s*claude') {
            throw "FAIL: bug signature present in LAUNCH_LOG (v1.1.1 regression)"
          }
          Write-Host "PASS: bug signature absent"

          # Invariant 2: the v1.1.1 :no_claude_exit message must be present.
          # This is the human-facing confirmation that the new path fired.
          if ($content -notmatch 'EXIT - No Claude in WSL') {
            throw "FAIL: expected v1.1.1 ':no_claude_exit' marker missing from log"
          }
          Write-Host "PASS: :no_claude_exit was reached"

          # Invariant 3: launcher must have exited with code 2 (the
          # documented v1.1.1 exit code for absent-Claude + declined-install).
          if ($env:LAUNCHER_EXITCODE -ne '2') {
            throw "FAIL: launcher exit code was '$env:LAUNCHER_EXITCODE', expected 2"
          }
          Write-Host "PASS: launcher exited with code 2"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          if (Test-Path $src) {
            Copy-Item $src -Destination "LAUNCH_LOG.txt"
            Write-Host "Copied $src to workspace"
          } else {
            Write-Host "WARNING: $src not present (launcher may have failed before logging)"
            "(LAUNCH_LOG was not created)" | Out-File -FilePath "LAUNCH_LOG.txt"
          }

      - name: Upload LAUNCH_LOG as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-no-claude-decline
          path: LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 3 — Validate the AUTO-INSTALL path end-to-end.
  # Scenario: WSL+Ubuntu present, Konsole absent, Claude absent. Feed Y to
  # the install prompt. Wait for the launcher to actually install Claude
  # Code via curl https://claude.ai/install.sh inside Ubuntu, then assert
  # `claude --version` works inside WSL afterwards.
  # This is the path that matters most: it answers "will the launcher
  # actually install Claude for the user, or will the user have to do it
  # by hand?". If this job is green, the answer is "yes, automatically."
  # The launcher's process is killed after install confirms (it would
  # otherwise hang trying to run claude TUI without a real terminal).
  # -------------------------------------------------------------------------
  test-no-claude-accept-install:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available on the runner
        shell: pwsh
        run: |
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: pwsh
        run: |
          wsl --install -d Ubuntu --no-launch
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host "wsl -l -v output:"
          Write-Host $list
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Confirm Claude is NOT in WSL (CI baseline)
        shell: pwsh
        run: |
          $r = wsl -d Ubuntu --user root -- bash -c "command -v claude || echo NOT_FOUND"
          Write-Host "claude lookup: $r"
          if ($r -notmatch 'NOT_FOUND') {
            throw "Claude unexpectedly already installed in fresh Ubuntu"
          }

      - name: Run launcher (accept install), wait for SUCCESS, then kill
        shell: pwsh
        run: |
          # Build stdin: Y to accept install, then a bunch of empty lines
          # to satisfy any subsequent set/p or pause prompts the launcher
          # may emit before we kill it.
          # MUST be CRLF: cmd's set /p reads stdin a "line" at a time and
          # bare-LF input gets consumed as a single token, so Set-Content
          # (which writes LF only on this PS) caused YN to come back as
          # something other than "Y" and the install prompt was declined
          # silently. WriteAllText with explicit \r\n matches what job 2
          # gets from cmd's own echo writer.
          $inputFile = "$env:RUNNER_TEMP\launcher_input.txt"
          [System.IO.File]::WriteAllText(
            $inputFile,
            "Y`r`n`r`n`r`n`r`n`r`n",
            [System.Text.Encoding]::ASCII
          )
          Write-Host "Input file bytes:"
          Format-Hex $inputFile | Out-String | Write-Host

          # Start the launcher in the background. We can't just block on it
          # because after install, the launcher tries to exec the claude
          # TUI which would hang forever in CI.
          $proc = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "call payload\kivun-terminal.bat C:\temp < `"$inputFile`"" `
            -PassThru -NoNewWindow -RedirectStandardOutput "launcher_stdout.txt" `
            -RedirectStandardError "launcher_stderr.txt"

          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          $start = Get-Date
          $installSucceeded = $false
          $installFailed = $false
          while (((Get-Date) - $start).TotalMinutes -lt 15) {
            if (Test-Path $log) {
              $content = Get-Content $log -Raw -ErrorAction SilentlyContinue
              if ($content -match 'SUCCESS - Claude Code installed in WSL') {
                $installSucceeded = $true
                break
              }
              if ($content -match 'ERROR - Claude auto-install failed') {
                $installFailed = $true
                break
              }
            }
            if ($proc.HasExited) { break }
            Start-Sleep -Seconds 10
          }

          # Kill the launcher (and any TUI children) so we can move on.
          if (-not $proc.HasExited) {
            Write-Host "Launcher still running after install signal; terminating tree."
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          # Belt and suspenders: kill stray claude/wsl/bash held by launcher.
          Get-Process | Where-Object { $_.ProcessName -in 'claude','wsl','bash','node' } |
            ForEach-Object { try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {} }

          if ($installFailed) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw -ErrorAction SilentlyContinue | Write-Host
            Write-Host "----- WSL install log -----"
            wsl -d Ubuntu --user root -- bash -c "cat /tmp/kivun-claude.log 2>/dev/null || echo no-log"
            throw "FAIL: launcher reported Claude auto-install failed"
          }
          if (-not $installSucceeded) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw -ErrorAction SilentlyContinue | Write-Host
            throw "FAIL: SUCCESS marker did not appear within 15 min"
          }
          Write-Host "PASS: launcher logged 'SUCCESS - Claude Code installed in WSL'"

      - name: Assert no [Y/N] prompt appeared (v1.1.3 default-yes UX)
        shell: pwsh
        run: |
          # The point of v1.1.3 is that a fresh user does NOT have to
          # type Y to get Claude installed. If this assertion ever
          # starts failing, somebody re-introduced the prompt as the
          # default and undid the UX fix.
          $stdout = Get-Content "launcher_stdout.txt" -Raw -ErrorAction SilentlyContinue
          if ($stdout -match 'Install Claude Code in Ubuntu now') {
            Write-Host "----- launcher_stdout.txt -----"
            Write-Host $stdout
            throw "FAIL: launcher prompted [Y/N] - v1.1.3 default-yes regressed"
          }
          Write-Host "PASS: no [Y/N] prompt shown to user"

      - name: Assert :run_direct fallback can find claude (v1.1.4)
        shell: pwsh
        run: |
          # In CI Konsole apt-install always fails (no GUI), so the
          # launcher hits :run_direct after the curl install succeeds.
          # If kivun-direct.sh cannot resolve claude (the v1.1.3 PATH
          # bug a real user hit), bash prints "claude: command not
          # found" before claude itself ever runs. v1.1.4 calls claude
          # via absolute path inside kivun-direct.sh, so this string
          # must never appear.
          $stdout = Get-Content "launcher_stdout.txt" -Raw -ErrorAction SilentlyContinue
          if ($stdout -match 'claude: command not found') {
            Write-Host "----- launcher_stdout.txt -----"
            Write-Host $stdout
            throw "FAIL: :run_direct could not locate claude binary (v1.1.4 regression)"
          }
          Write-Host "PASS: :run_direct resolved claude (no 'command not found')"

      - name: Assert claude is actually callable inside Ubuntu
        shell: pwsh
        run: |
          # The strongest signal: claude --version returns 0 and prints
          # a version string. Use the absolute path to the user-local
          # install (where the launcher's curl-based installer puts
          # claude). Cannot rely on PATH here for the same reason the
          # launcher cannot: $PATH inherited from windows-latest contains
          # /mnt/c/Program Files (x86)/... entries with literal `(` and
          # `)` that bash word-splits and chokes on.
          $ver = wsl -d Ubuntu --user root -- bash -c "/root/.local/bin/claude --version 2>&1 || /usr/local/bin/claude --version 2>&1" | Out-String
          $rc = $LASTEXITCODE
          Write-Host "claude --version output: $ver"
          Write-Host "claude --version exit code: $rc"
          if ($rc -ne 0) {
            throw "FAIL: claude --version exited $rc inside WSL Ubuntu"
          }
          if ($ver -match 'not found' -or $ver -match 'No such file') {
            throw "FAIL: claude --version reports binary missing inside WSL"
          }
          Write-Host "PASS: Claude Code is installed in Ubuntu and callable via the launcher's auto-install path"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          if (Test-Path $src) {
            Copy-Item $src -Destination "LAUNCH_LOG.txt"
          } else {
            "(LAUNCH_LOG was not created)" | Out-File -FilePath "LAUNCH_LOG.txt"
          }
          # Also pull the WSL-side install log for postmortem.
          wsl -d Ubuntu --user root -- bash -c "cat /tmp/kivun-claude.log 2>/dev/null" `
            > "WSL_INSTALL_LOG.txt" 2>$null

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-no-claude-accept-install
          path: |
            LAUNCH_LOG.txt
            WSL_INSTALL_LOG.txt
            launcher_stdout.txt
            launcher_stderr.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 4 — v1.1.5 regression: launcher must SEE an existing Claude install.
  # User report (2026-04-26): on Windows 11, the launcher reinstalled Claude
  # on EVERY launch ("דבילי") because its presence check used
  # `bash -c "command -v claude"` -- non-login bash whose PATH does not
  # include ~/.local/bin where curl install.sh drops the binary. v1.1.5
  # changes the check to a `test -x` chain over absolute install slots.
  # This job pre-installs Claude manually, then runs the launcher with
  # AUTO_INSTALL_CLAUDE=no so a regressed presence check would force the
  # launcher down :no_claude_exit (exit 2) instead of :claude_present.
  # The expected v1.1.5 behavior is exit-non-2 because the launcher saw
  # claude was already installed.
  # -------------------------------------------------------------------------
  test-existing-claude-no-reinstall:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available on the runner
        shell: pwsh
        run: |
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: pwsh
        run: |
          wsl --install -d Ubuntu --no-launch
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host $list
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Pre-install Claude in Ubuntu (simulating a returning user)
        shell: pwsh
        run: |
          # Drop claude into the same slot the launcher's curl installer
          # uses (~/.local/bin) so we exercise the exact path the bug
          # missed. Using the official installer keeps the test honest:
          # if Anthropic ever moves the install location, this job will
          # break and force the resolver to be updated alongside.
          wsl -d Ubuntu --user root -- bash -c `
            "curl -fsSL https://claude.ai/install.sh -o /tmp/c.sh && bash /tmp/c.sh && rm -f /tmp/c.sh"
          $rc = $LASTEXITCODE
          if ($rc -ne 0) { throw "Pre-install of Claude in WSL failed (exit $rc)" }
          # Sanity check via absolute path -- same way the v1.1.5 launcher
          # check works, so we know what the launcher will see.
          $ver = wsl -d Ubuntu --user root -- bash -c "/root/.local/bin/claude --version 2>&1" | Out-String
          Write-Host "Pre-installed claude: $ver"
          if ($LASTEXITCODE -ne 0) { throw "Pre-installed claude not callable" }

      - name: Run launcher, wait for claude-present marker, kill
        shell: pwsh
        # If the v1.1.5 presence check works, the launcher sees claude
        # already there, skips the install branch, then heads into the
        # Konsole stage. In CI Konsole launch fails (no GUI), the
        # launcher falls into :run_direct and tries to spawn the claude
        # TUI, which would hang. So we run it in the background, watch
        # LAUNCH_LOG.txt for the claude-present marker, then kill.
        run: |
          # AUTO_INSTALL_CLAUDE=no makes a regression LOUD: if the check
          # ever falsely reports "not found" again, the launcher exits 2
          # via :no_claude_exit instead of silently reinstalling.
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          $inputFile = "$env:RUNNER_TEMP\launcher_input.txt"
          [System.IO.File]::WriteAllText($inputFile, "`r`n`r`n`r`n", [System.Text.Encoding]::ASCII)

          $proc = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "call payload\kivun-terminal.bat C:\temp < `"$inputFile`"" `
            -PassThru -NoNewWindow -RedirectStandardOutput "launcher_stdout.txt" `
            -RedirectStandardError "launcher_stderr.txt"

          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          $start = Get-Date
          $sawPresent = $false
          $sawNoClaude = $false
          while (((Get-Date) - $start).TotalMinutes -lt 5) {
            if (Test-Path $log) {
              $content = Get-Content $log -Raw -ErrorAction SilentlyContinue
              if ($content -match 'SUCCESS - Claude Code is installed') {
                $sawPresent = $true
                break
              }
              if ($content -match 'EXIT - No Claude in WSL') {
                $sawNoClaude = $true
                break
              }
            }
            if ($proc.HasExited) { break }
            Start-Sleep -Seconds 5
          }

          if (-not $proc.HasExited) {
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          Get-Process | Where-Object { $_.ProcessName -in 'claude','wsl','bash','node' } |
            ForEach-Object { try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {} }

          if ($sawNoClaude) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw | Write-Host
            throw "FAIL: launcher hit :no_claude_exit even though Claude IS installed (v1.1.5 presence-check regression)"
          }
          if (-not $sawPresent) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw -ErrorAction SilentlyContinue | Write-Host
            throw "FAIL: launcher never reached :claude_present within 5 min"
          }
          Write-Host "PASS: launcher saw existing Claude install via the v1.1.5 absolute-path check"

      - name: Assert install branch was skipped (the actual bug)
        shell: pwsh
        run: |
          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          $content = Get-Content $log -Raw

          # Auto-install log line is the cheapest sentinel for the bug --
          # it appears whether AUTO_INSTALL_CLAUDE is yes or no, whenever
          # the presence check decided claude was missing.
          if ($content -match 'Auto-installing Claude|Installing Claude Code via official installer|User declined Claude auto-install|ERROR - Claude Code not found') {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Write-Host $content
            throw "FAIL: launcher entered install branch despite Claude already being installed (the user-reported bug)"
          }
          Write-Host "PASS: install branch was skipped — no spurious reinstall"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          if (Test-Path $src) {
            Copy-Item $src -Destination "LAUNCH_LOG.txt"
          } else {
            "(LAUNCH_LOG was not created)" | Out-File -FilePath "LAUNCH_LOG.txt"
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-existing-claude-no-reinstall
          path: LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 5 — v1.1.6 active-discovery: launcher must find a claude install
  # at a NON-STANDARD path (e.g. simulating nvm/pnpm/yarn-global).
  # We pre-install claude at /opt/kivun-test/claude (NOT in any of the
  # absolute slots ~/.local/bin, /usr/local/bin, /usr/bin) and add that
  # dir to the WSL user's .bashrc so a login shell sees it. The v1.1.6
  # `bash -lc "command -v claude"` fallback must discover it; if the
  # launcher only checks the standard slots (the v1.1.5 behavior), it
  # will reinstall instead of skipping. With AUTO_INSTALL_CLAUDE=no a
  # regression turns into a loud :no_claude_exit.
  # -------------------------------------------------------------------------
  test-claude-discovery-from-bashrc:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: pwsh
        run: |
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch)
        shell: pwsh
        run: |
          wsl --install -d Ubuntu --no-launch
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host $list
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Install claude at a NON-STANDARD path + add to .bashrc
        shell: pwsh
        run: |
          # Drop a stub `claude` binary in /opt/kivun-test (not in any
          # standard slot the resolver hard-codes) and put that dir on
          # PATH via root's .bashrc so a login shell finds it. This
          # simulates the nvm/pnpm/yarn pattern of "PATH gets set up
          # by rc files, not by the system default".
          #
          # ABANDONED: inline `wsl bash -c "..."` quoting.
          # Multiple CI rounds proved that `$PATH` could not be passed
          # through PowerShell -> wsl.exe -> bash unexpanded by ANY
          # combination of PS escapes and bash quote nesting. Even with
          # PS double-quote outer + bash single-quote inner, bash STILL
          # expanded $PATH at echo time, dropping the runner's literal
          # PATH (full of `(x86)` parens) into .profile and breaking
          # every subsequent `bash -lc` with "syntax error near `('".
          #
          # Approach that actually works: write a real bash script to
          # disk on the Windows side (with LF line endings, no PS
          # interpolation), then exec it inside WSL. Inside the script,
          # bash quoting works exactly like it does on any Linux machine
          # because there's no Win32-cmdline middleware mangling args.
          $setupScript = @'
          #!/bin/bash
          set -e
          mkdir -p /opt/kivun-test
          cat > /opt/kivun-test/claude <<'STUB'
          #!/bin/bash
          echo "kivun-test claude stub v1.1.6 (non-standard PATH)"
          exit 0
          STUB
          chmod +x /opt/kivun-test/claude
          # Bash single quotes around the whole export -- $PATH stays
          # literal on disk and expands at source time, not now.
          grep -q 'kivun-test' /root/.bashrc 2>/dev/null \
            || echo 'export PATH=/opt/kivun-test:$PATH' >> /root/.bashrc
          grep -q 'kivun-test' /root/.profile 2>/dev/null \
            || echo 'export PATH=/opt/kivun-test:$PATH' >> /root/.profile
          # Verify the login-shell lookup the launcher will perform.
          bash -lc 'command -v claude'
          '@ -replace "`r`n", "`n"

          # The PowerShell here-string above preserves the leading 10-space
          # indent on every line. Strip it so bash sees flush-left content
          # (heredoc closer 'STUB' MUST start at column 0 to terminate).
          $setupScript = ($setupScript -split "`n" | ForEach-Object {
            if ($_ -match '^          (.*)$') { $matches[1] } else { $_ }
          }) -join "`n"

          $tmpScript = "$env:RUNNER_TEMP\kivun-stub-setup.sh"
          [System.IO.File]::WriteAllText(
            $tmpScript,
            $setupScript,
            (New-Object System.Text.UTF8Encoding $false)
          )
          Write-Host "----- setup.sh contents -----"
          Get-Content $tmpScript | ForEach-Object { Write-Host $_ }
          Write-Host "------------------------------"

          # Translate the Windows path to its /mnt/<drive>/... WSL form.
          # Doing this in PS instead of via `wsl wslpath -u` because the
          # PS->wsl.exe arg boundary strips backslashes from path args
          # ("D:\a\_temp\..." arrived inside WSL as "D:a_temp..." with
          # all separators eaten), which made wslpath silently return
          # null and the .Trim() call below blew up with
          # "You cannot call a method on a null-valued expression".
          $drive  = $tmpScript.Substring(0, 1).ToLower()
          $rest   = $tmpScript.Substring(2) -replace '\\', '/'
          $wslPath = "/mnt/$drive$rest"
          Write-Host "Exec: wsl bash $wslPath"
          wsl -d Ubuntu --user root -- bash $wslPath
          if ($LASTEXITCODE -ne 0) { throw "stub setup script failed inside WSL" }

          # Negative check: standard absolute slots must NOT have claude,
          # otherwise the v1.1.6 discovery branch wouldn't fire and the
          # test wouldn't actually be testing what we think.
          $slots = @(
            "test -x /root/.local/bin/claude",
            "test -x /usr/local/bin/claude",
            "test -x /usr/bin/claude"
          )
          foreach ($slot in $slots) {
            wsl -d Ubuntu --user root -- bash -c $slot
            if ($LASTEXITCODE -eq 0) {
              throw "Test setup invalid: $slot succeeded but should be empty"
            }
          }
          Write-Host "Setup OK: claude only at /opt/kivun-test, none of the standard slots."
          # The negative-check loop above intentionally invokes commands
          # that exit 1 (test -x on missing files). PowerShell propagates
          # the LAST $LASTEXITCODE as the step's exit code, so without
          # this the step would fail despite reaching "Setup OK".
          $global:LASTEXITCODE = 0
          exit 0

      - name: Run launcher with AUTO_INSTALL_CLAUDE=no
        shell: pwsh
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) | Out-File -FilePath "payload\config.txt" -Encoding ASCII
          $inputFile = "$env:RUNNER_TEMP\launcher_input.txt"
          [System.IO.File]::WriteAllText($inputFile, "`r`n`r`n`r`n", [System.Text.Encoding]::ASCII)

          $proc = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "call payload\kivun-terminal.bat C:\temp < `"$inputFile`"" `
            -PassThru -NoNewWindow -RedirectStandardOutput "launcher_stdout.txt" `
            -RedirectStandardError "launcher_stderr.txt"

          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          $start = Get-Date
          $sawPresent = $false
          $sawNoClaude = $false
          while (((Get-Date) - $start).TotalMinutes -lt 5) {
            if (Test-Path $log) {
              $content = Get-Content $log -Raw -ErrorAction SilentlyContinue
              if ($content -match 'SUCCESS - Claude Code is installed') {
                $sawPresent = $true
                break
              }
              if ($content -match 'EXIT - No Claude in WSL') {
                $sawNoClaude = $true
                break
              }
            }
            if ($proc.HasExited) { break }
            Start-Sleep -Seconds 5
          }

          if (-not $proc.HasExited) {
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          Get-Process | Where-Object { $_.ProcessName -in 'claude','wsl','bash','node' } |
            ForEach-Object { try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {} }

          if ($sawNoClaude) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw | Write-Host
            throw "FAIL: launcher hit :no_claude_exit despite claude being on PATH via .bashrc (v1.1.6 active-discovery regression)"
          }
          if (-not $sawPresent) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw -ErrorAction SilentlyContinue | Write-Host
            throw "FAIL: launcher never reached :claude_present"
          }
          Write-Host "PASS: launcher discovered claude at non-standard path via login-shell lookup"

      - name: Assert the discovery branch (not the standard-slot branch) fired
        shell: pwsh
        run: |
          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          $content = Get-Content $log -Raw
          # The v1.1.6 marker for the new login-shell fallback. If we
          # ever see SUCCESS without this line, that means the standard
          # slots somehow had claude and our test setup is broken.
          if ($content -notmatch 'Claude found via login-shell PATH') {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Write-Host $content
            throw "FAIL: discovery branch did not fire -- standard slots had claude (test setup invalid)"
          }
          Write-Host "PASS: v1.1.6 discovery branch fired as expected"

      - name: Copy LAUNCH_LOG into workspace for upload
        if: always()
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          if (Test-Path $src) {
            Copy-Item $src -Destination "LAUNCH_LOG.txt"
          } else {
            "(LAUNCH_LOG was not created)" | Out-File -FilePath "LAUNCH_LOG.txt"
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-claude-discovery-from-bashrc
          path: LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 6 — v1.1.15 abort path AND v1.1.16 WSL_PATH=. fallback (bundled).
  # Bundles two regressions that escaped CI before:
  #   (a) v1.1.15 abort when WSL has no non-root user. The default
  #       windows-latest WSL Ubuntu (--no-launch) ships with root as the
  #       only user — exactly the scenario user 'mipmip' hit. With Claude
  #       pre-installed (so the launcher passes the claude-present check),
  #       the launcher must reach the user-detection block, fail to find
  #       UID 1000, and exit cleanly with helpful instructions.
  #   (b) v1.1.16 WSL_PATH=. fallback. wslpath returns the literal "."
  #       string when given "" or "." input. Pre-v1.1.16 the bash launcher
  #       would `cd .` into whatever cwd cmd inherited — typically the
  #       Kivun install dir when launched via the Desktop shortcut.
  # The test invokes the launcher TWICE in one CI job to share the WSL
  # setup cost. Run A uses "." arg (dot-fallback), Run B uses a normal
  # path arg (abort path). Each has its own assertions.
  # -------------------------------------------------------------------------
  test-v1115-abort-and-v1116-dot-fallback:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: pwsh
        run: |
          wsl --status
          wsl --version

      - name: Install Ubuntu in WSL (no-launch, default user = root)
        shell: pwsh
        run: |
          wsl --install -d Ubuntu --no-launch
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host $list
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Confirm no UID 1000 user exists (the v1.1.15 abort scenario)
        shell: pwsh
        run: |
          # The launcher's v1.1.15 fallback queries `id -un 1000` after
          # WSLg owner detection returns root or empty. UID 1000 must be
          # absent here so the abort path will fire in run B.
          $r = (wsl -d Ubuntu --user root -- bash -c "id -un 1000 2>&1; true") | Out-String
          Write-Host "id -un 1000: $r"
          if ($r -notmatch 'no such user|cannot find name') {
            throw "Test setup invalid: UID 1000 already exists, can't exercise abort path"
          }

      - name: Pre-install Claude as root in Ubuntu
        shell: pwsh
        run: |
          # Pre-install Claude so the launcher passes the claude-present
          # check and reaches the v1.1.15 user-detection block. Without
          # Claude, the launcher exits earlier with EXIT - No Claude in WSL.
          wsl -d Ubuntu --user root -- bash -c "curl -fsSL https://claude.ai/install.sh -o /tmp/c.sh && bash /tmp/c.sh && rm -f /tmp/c.sh"
          if ($LASTEXITCODE -ne 0) { throw "Pre-install of Claude failed" }
          $ver = wsl -d Ubuntu --user root -- bash -c "/root/.local/bin/claude --version 2>&1" | Out-String
          if ($LASTEXITCODE -ne 0) { throw "Claude not callable post-install" }
          Write-Host "Pre-installed claude: $ver"

      - name: 'Run A — launcher with "." arg (v1.1.16 dot-fallback)'
        shell: cmd
        continue-on-error: true
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) > "payload\config.txt"
          (echo.) > "%RUNNER_TEMP%\input.txt"
          (echo.) >> "%RUNNER_TEMP%\input.txt"
          REM Pass "." literally — wslpath turns "." into ".", which is
          REM exactly the input pattern v1.1.16 added a fallback for.
          call payload\kivun-terminal.bat . < "%RUNNER_TEMP%\input.txt"
          set "RC_A=%ERRORLEVEL%"
          (echo RUN_A_EXITCODE=%RC_A%)>>"%GITHUB_ENV%"
          REM Snapshot the log after run A — run B's invocations append
          REM to the same LAUNCH_LOG.txt, so we'd lose the dot-fallback
          REM context window without snapshotting.
          copy "%LOCALAPPDATA%\Kivun-WSL\LAUNCH_LOG.txt" "LAUNCH_LOG_A.txt" >nul

      - name: Assert v1.1.16 WSL_PATH=. fallback fired in run A
        shell: pwsh
        run: |
          $log = Get-Content "LAUNCH_LOG_A.txt" -Raw
          Write-Host "----- LAUNCH_LOG_A.txt (run with '.') -----"
          Write-Host $log
          Write-Host "-------------------------------------------"
          # The marker is the v1.1.16 log line. If this disappears, the
          # bash launcher is back to cd'ing into the install dir.
          if ($log -notmatch "Path conversion returned '\.'") {
            throw "FAIL: v1.1.16 WSL_PATH=. fallback log line missing — bug back"
          }
          Write-Host "PASS: v1.1.16 dot-fallback fired"

      - name: 'Run B — launcher with normal path (v1.1.15 abort)'
        shell: cmd
        continue-on-error: true
        run: |
          (echo.) > "%RUNNER_TEMP%\input.txt"
          (echo.) >> "%RUNNER_TEMP%\input.txt"
          call payload\kivun-terminal.bat C:\temp < "%RUNNER_TEMP%\input.txt"
          set "RC_B=%ERRORLEVEL%"
          (echo RUN_B_EXITCODE=%RC_B%)>>"%GITHUB_ENV%"

      - name: Assert v1.1.15 abort fired in run B
        shell: pwsh
        run: |
          $log = Get-Content "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt" -Raw
          Write-Host "----- LAUNCH_LOG.txt (full) -----"
          Write-Host $log
          Write-Host "---------------------------------"
          if ($log -notmatch 'No non-root user \(UID 1000\) found') {
            throw "FAIL: v1.1.15 abort log line missing — root-user-check regressed"
          }
          if ($env:RUN_B_EXITCODE -ne '1') {
            throw "FAIL: launcher exit code was '$env:RUN_B_EXITCODE', expected 1 (v1.1.15 abort)"
          }
          # Defense-in-depth: launcher must NOT pretend to fall through
          # past the abort. The fake fall-through (warn-then-crash) was
          # the v1.1.0 anti-pattern that ate user 'mipmip' twice.
          if ($log -match 'INFO - Launching Konsole|INFO - Falling back to direct') {
            throw "FAIL: launcher proceeded past abort despite no UID 1000"
          }
          Write-Host "PASS: v1.1.15 abort fired with exit 1 + no fake fall-through"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-v1115-abort-and-v1116-dot-fallback
          path: |
            LAUNCH_LOG_A.txt
            LAUNCH_LOG.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 7 — v1.1.15 routes through UID 1000 when WSLg owner is root/empty.
  # Setup: create non-root user "kivuntest" at UID 1000 (the conventional
  # first interactive user), keep root as the wsl default user, install
  # Claude visible to the launcher's standard-slot probe. The launcher must
  #   1. Detect WSLg owner = root → discard
  #   2. Look up id -un 1000 → "kivuntest"
  #   3. Log "Will run as: kivuntest"
  #   4. Pass --user kivuntest to all subsequent wsl invocations
  # The Konsole launch will fail (no GUI) but we kill the launcher after
  # confirming the user-detection log marker.
  # -------------------------------------------------------------------------
  test-v1115-routes-through-uid-1000:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: pwsh
        run: |
          wsl --status

      - name: Install Ubuntu in WSL (no-launch)
        shell: pwsh
        run: |
          wsl --install -d Ubuntu --no-launch
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host $list
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Create UID 1000 user "kivuntest" (default wsl user stays root)
        shell: pwsh
        run: |
          # useradd (not adduser, which prompts interactively for full-name).
          # -u 1000 = the conventional first non-root UID the launcher's
          # v1.1.15 fallback queries via `id -un 1000`. -m creates the
          # home dir. Default wsl user is NOT changed — stays root, the
          # mipmip/root-default-user scenario.
          wsl -d Ubuntu --user root -- bash -c "useradd -u 1000 -m -s /bin/bash kivuntest && id kivuntest"
          if ($LASTEXITCODE -ne 0) { throw "useradd failed" }
          $u = (wsl -d Ubuntu --user root -- bash -c "id -un 1000") | Out-String
          $u = $u.Trim()
          Write-Host "id -un 1000: '$u'"
          if ($u -ne 'kivuntest') {
            throw "Setup wrong: id -un 1000 returned '$u', expected 'kivuntest'"
          }

      - name: Pre-install Claude system-wide so the launcher's probe finds it
        shell: pwsh
        run: |
          # Install as kivuntest so $HOME resolves correctly, then
          # symlink to /usr/local/bin so the launcher's claude-present
          # probe (which tests $HOME/.local/bin/claude || /usr/local/bin/claude)
          # finds it from any user context.
          wsl -d Ubuntu --user kivuntest -- bash -c "curl -fsSL https://claude.ai/install.sh -o /tmp/c.sh && bash /tmp/c.sh && rm -f /tmp/c.sh"
          if ($LASTEXITCODE -ne 0) { throw "Claude pre-install as kivuntest failed" }
          wsl -d Ubuntu --user root -- bash -c "ln -sf /home/kivuntest/.local/bin/claude /usr/local/bin/claude && /usr/local/bin/claude --version"
          if ($LASTEXITCODE -ne 0) { throw "claude not callable via /usr/local/bin symlink" }

      - name: 'Run launcher, wait for Will-run-as kivuntest marker, then kill'
        shell: pwsh
        run: |
          (echo AUTO_INSTALL_CLAUDE=no) | Out-File -FilePath "payload\config.txt" -Encoding ASCII
          $inputFile = "$env:RUNNER_TEMP\launcher_input.txt"
          [System.IO.File]::WriteAllText($inputFile, "`r`n`r`n`r`n", [System.Text.Encoding]::ASCII)

          $proc = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/c", "call payload\kivun-terminal.bat C:\temp < `"$inputFile`"" `
            -PassThru -NoNewWindow -RedirectStandardOutput "launcher_stdout.txt" `
            -RedirectStandardError "launcher_stderr.txt"

          $log = "$env:LOCALAPPDATA\Kivun-WSL\LAUNCH_LOG.txt"
          $start = Get-Date
          $sawMarker = $false
          $sawAbort = $false
          while (((Get-Date) - $start).TotalMinutes -lt 5) {
            if (Test-Path $log) {
              $content = Get-Content $log -Raw -ErrorAction SilentlyContinue
              if ($content -match 'Will run as: kivuntest') {
                $sawMarker = $true
                break
              }
              if ($content -match 'No non-root user \(UID 1000\) found') {
                $sawAbort = $true
                break
              }
            }
            if ($proc.HasExited) { break }
            Start-Sleep -Seconds 5
          }

          if (-not $proc.HasExited) {
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          Get-Process | Where-Object { $_.ProcessName -in 'claude','wsl','bash','node' } |
            ForEach-Object { try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {} }

          if ($sawAbort) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw | Write-Host
            throw "FAIL: launcher hit abort path despite UID 1000 existing — v1.1.15 fallback regressed"
          }
          if (-not $sawMarker) {
            Write-Host "----- LAUNCH_LOG.txt -----"
            Get-Content $log -Raw -ErrorAction SilentlyContinue | Write-Host
            throw "FAIL: launcher never logged 'Will run as: kivuntest' within 5 min"
          }
          Write-Host "PASS: v1.1.15 routed through UID 1000 user as expected"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LAUNCH_LOG-v1115-uid-1000-routing
          path: |
            LAUNCH_LOG.txt
            launcher_stdout.txt
            launcher_stderr.txt
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 8 — v1.1.14 + v1.1.15 EUID guards in kivun-launch.sh + kivun-direct.sh.
  # The .bat already prevents these scripts from being called as root in
  # the normal flow (--user is always set to a non-root user). But the
  # guards are defense-in-depth: if upstream WSL/distro changes break the
  # .bat detection, OR if someone calls the .sh files directly via wsl
  # --user root, both scripts must refuse cleanly with copy-paste-able
  # instructions instead of letting Claude show its cryptic "exited
  # with code 1 — --dangerously-skip-permissions cannot be used with
  # root" error.
  # -------------------------------------------------------------------------
  test-sh-scripts-refuse-root:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Confirm WSL is available
        shell: pwsh
        run: |
          wsl --status

      - name: Install Ubuntu in WSL (no-launch)
        shell: pwsh
        run: |
          wsl --install -d Ubuntu --no-launch
          $start = Get-Date
          do {
            Start-Sleep -Seconds 5
            $list = wsl -l -v 2>&1 | Out-String
            if ($list -match 'Ubuntu') { break }
          } while (((Get-Date) - $start).TotalSeconds -lt 120)
          Write-Host $list
          wsl -d Ubuntu --user root -- bash -c "echo Ubuntu ready"

      - name: Compute payload path inside WSL (no hardcoded username)
        shell: pwsh
        run: |
          # The runner's checkout dir varies (D:\a\... or C:\actions-runner\_work\...).
          # Derive the WSL form dynamically — never hardcode. Same pattern
          # as job 5 but factored into one step here for reuse below.
          $payload = (Resolve-Path "payload").Path
          $drive = $payload.Substring(0,1).ToLower()
          $rest = $payload.Substring(2) -replace '\\','/'
          $wslPayload = "/mnt/$drive$rest"
          Write-Host "payload (Windows): $payload"
          Write-Host "payload (WSL):     $wslPayload"
          "WSL_PAYLOAD=$wslPayload" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Strip CRLF from .sh files (Windows checkout adds CRLF)
        shell: pwsh
        run: |
          # The launcher .bat does this in production. Bash on the runner
          # would otherwise hit "$'\r': command not found" on every line.
          wsl -d Ubuntu --user root -- bash -c "sed -i 's/\r$//' $env:WSL_PAYLOAD/kivun-launch.sh $env:WSL_PAYLOAD/kivun-direct.sh"

      - name: 'kivun-direct.sh as root → must exit 1 with refusal message'
        shell: pwsh
        run: |
          $out = wsl -d Ubuntu --user root -- bash "$env:WSL_PAYLOAD/kivun-direct.sh" /tmp "test-prompt" 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host "----- kivun-direct.sh stdout/stderr -----"
          Write-Host $out
          Write-Host "----- exit code: $rc -----"
          if ($rc -ne 1) {
            throw "FAIL: kivun-direct.sh exit code was $rc, expected 1 (v1.1.15 EUID guard)"
          }
          if ($out -notmatch 'Kivun direct-fallback is running as root') {
            throw "FAIL: refusal message missing — kivun-direct.sh let root through"
          }
          if ($out -notmatch 'wsl -d Ubuntu --user root -- adduser') {
            throw "FAIL: copy-paste-able fix instructions missing from refusal output"
          }
          Write-Host "PASS: kivun-direct.sh refused root with exit 1 + helpful instructions"
          # The whole point of this step is to verify the script intentionally
          # exits non-zero. PowerShell would otherwise propagate $LASTEXITCODE=1
          # from the wsl call and fail the step despite all assertions passing.
          exit 0

      - name: 'kivun-launch.sh as root → must exit 1 with refusal message'
        shell: pwsh
        run: |
          # 7 positional args, all with defaults — the EUID guard fires
          # before they're consumed, so dummy values are fine.
          $out = wsl -d Ubuntu --user root -- bash "$env:WSL_PAYLOAD/kivun-launch.sh" "/tmp" "test-prompt" "hebrew" "false" "/tmp/k.log" "rtl" "0 0 1024 768" 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host "----- kivun-launch.sh stdout/stderr -----"
          Write-Host $out
          Write-Host "----- exit code: $rc -----"
          if ($rc -ne 1) {
            throw "FAIL: kivun-launch.sh exit code was $rc, expected 1 (v1.1.14 EUID guard)"
          }
          if ($out -notmatch 'Kivun launcher is running as root') {
            throw "FAIL: refusal message missing — kivun-launch.sh let root through"
          }
          Write-Host "PASS: kivun-launch.sh refused root with exit 1 + helpful instructions"
          # Same reason as the kivun-direct.sh step above.
          exit 0
